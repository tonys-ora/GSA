<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>GSA</title>
    <meta
      name="description"
      content="SkyStake is a leading crypto casino and sportsbook offering slots, live casino tables, sports betting, crypto payments, fast withdrawals, and secure online gaming."
    />
    <meta
      name="keywords"
      content="crypto casino, bitcoin casino, online casino, live casino, crypto sportsbook, sports betting, slots, live dealer, BTC betting, gambling platform"
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://skystake.com" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#000000" />

    <!-- Preconnect for Faster Loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicons -->
    <link rel="icon" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" sizes="96x96" href="/favicon-96.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="SkyStake | Crypto Casino & Sports Betting" />
    <meta
      property="og:description"
      content="Play crypto slots, live casino, and bet on sports with fast BTC deposits & withdrawals on SkyStake."
    />
    <meta property="og:image" content="https://skystake.com/logo.png" />
    <meta property="og:url" content="https://skystake.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SkyStake | Crypto Casino & Sportsbook" />
    <meta
      name="twitter:description"
      content="Bet on sports and play live casino using Bitcoin, USDT, and other crypto currencies."
    />
    <meta name="twitter:image" content="https://skystake.com/logo.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Preloads -->
    <link rel="preload" href="/logo.png" as="image" />
    <!-- <link rel="preload" href="/logo-mobile.svg" as="image" /> -->

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "SkyStake",
        "url": "https://skystake.com",
        "logo": "https://skystake.com/logo.png",
        "sameAs": []
      }
    </script>

    <!-- Structured Data: Casino + Sportsbook -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Casino",
        "name": "SkyStake Crypto Casino",
        "url": "https://skystake.com",
        "paymentAccepted": ["Bitcoin", "USDT", "Ethereum", "Credit Card"],
        "currenciesAccepted": ["BTC", "USDT", "ETH"],
        "openingHours": "24/7",
        "servesCuisine": "N/A"
      }
    </script>

    <!-- SearchAction -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "url": "https://skystake.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://skystake.com/search?q={search_term}",
          "query-input": "required name=search_term"
        }
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
